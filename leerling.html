<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OOGST – Hoe voel jij je?</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,700;0,900;1,300&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --creme:#FAF6EF; --creme-2:#F2EBE0; --zand:#E8DDD0; --donker:#2C2416; --accent:#D4744A; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--creme); font-family:'DM Sans',sans-serif; color:var(--donker); min-height:100vh; }

    header { padding:2.5rem 2rem 1.5rem; background:var(--creme); position:sticky; top:0; z-index:10; border-bottom:2px solid var(--zand); }
    h1 { font-family:'Fraunces',serif; font-weight:900; font-size:clamp(2.8rem,8vw,5rem); line-height:0.9; letter-spacing:-0.02em; }
    .ondertitel { font-family:'Fraunces',serif; font-style:italic; font-weight:300; font-size:1.05rem; color:#7A6A58; margin-top:0.6rem; }
    .teller-balk { display:flex; align-items:center; gap:0.75rem; margin-top:1.2rem; }
    .bolletje { width:13px; height:13px; border-radius:50%; border:2px solid var(--donker); background:transparent; transition:background 0.3s; }
    .bolletje.vol { background:var(--donker); }
    .teller-tekst { font-size:0.85rem; font-weight:500; color:#7A6A58; }

    /* Grid */
    .bloemen-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; padding:1.5rem; max-width:700px; margin:0 auto; }
    @media(max-width:480px){ .bloemen-grid{ grid-template-columns:repeat(2,1fr); } }

    /* Kaart */
    .bloem-kaart { background:white; border:2px solid var(--zand); border-radius:16px; padding:1rem 0.8rem 0.8rem; display:flex; flex-direction:column; align-items:center; gap:0.4rem; cursor:pointer; user-select:none; transition:transform 0.2s ease,border-color 0.2s,background 0.2s,box-shadow 0.2s; }
    .bloem-kaart:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.08); }
    .bloem-kaart.gekozen { border-color:var(--donker); background:var(--creme-2); transform:translateY(-4px) scale(1.03); box-shadow:0 8px 24px rgba(44,36,22,0.15); }
    .bloem-kaart.uitgedoofd { opacity:0.3; cursor:not-allowed; transform:none !important; box-shadow:none !important; }

    /* Bloem icoon — vierkant, object-fit contain zodat altijd volledig zichtbaar */
    .bloem-icoon {
      width:90px; height:90px;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
      transition:transform 0.3s ease;
    }
    .bloem-icoon svg { width:100%; height:100%; }
    .bloem-kaart:not(.uitgedoofd):hover .bloem-icoon { transform:rotate(-5deg) scale(1.08); }
    .bloem-kaart.gekozen .bloem-icoon { animation:schommel 0.4s ease; }
    @keyframes schommel { 0%{transform:rotate(0)} 25%{transform:rotate(-10deg) scale(1.1)} 75%{transform:rotate(7deg) scale(1.1)} 100%{transform:rotate(0) scale(1)} }

    .bloem-naam { font-weight:600; font-size:0.68rem; letter-spacing:0.09em; text-transform:uppercase; text-align:center; }

    .vinkje { display:none; width:22px; height:22px; background:var(--donker); border-radius:50%; align-items:center; justify-content:center; color:white; font-size:0.7rem; font-weight:bold; }
    .bloem-kaart.gekozen .vinkje { display:flex; animation:verschijn 0.3s ease; }
    @keyframes verschijn { from{transform:scale(0)} to{transform:scale(1)} }

    /* ===== INTENSITEITSSCHUIF =====
       Verschijnt onder de bloem als de kaart gekozen is.
       De slider bepaalt de stengellengte (en dus bloemgrootte) in de tuin.
       Waarde: 0–100, standaard 50 (gemiddeld).
    */
    .intensiteit-wrap {
      display:none;
      flex-direction:column;
      align-items:center;
      gap:5px;
      width:100%;
      padding:8px 6px 2px;
      border-top:1px solid var(--zand);
      margin-top:4px;
    }
    .bloem-kaart.gekozen .intensiteit-wrap { display:flex; }

    .intensiteit-rij { display:flex; align-items:center; gap:6px; width:100%; }
    .int-label-klein { font-size:0.58rem; color:#A09080; white-space:nowrap; }
    .int-label-groot { font-size:0.58rem; color:#A09080; white-space:nowrap; }

    .intensiteit-slider {
      -webkit-appearance:none; appearance:none;
      flex:1; height:4px;
      background:var(--zand);
      border-radius:2px; outline:none; cursor:pointer;
    }
    .intensiteit-slider::-webkit-slider-thumb {
      -webkit-appearance:none; appearance:none;
      width:18px; height:18px; border-radius:50%;
      background:var(--donker); cursor:pointer;
      border:2px solid white; box-shadow:0 1px 4px rgba(0,0,0,0.25);
    }
    .intensiteit-slider::-moz-range-thumb {
      width:18px; height:18px; border-radius:50%;
      background:var(--donker); cursor:pointer;
      border:2px solid white;
    }

    /* Verstuurknop */
    .verstuur-balk { position:sticky; bottom:0; background:linear-gradient(to top,var(--creme) 80%,transparent); padding:1.2rem 1.5rem 1.5rem; display:flex; justify-content:center; }
    .verstuur-knop { background:var(--donker); color:var(--creme); font-family:'Fraunces',serif; font-style:italic; font-weight:300; font-size:1.2rem; padding:1rem 3rem; border:none; border-radius:100px; cursor:pointer; transition:background 0.2s,transform 0.2s; opacity:0.3; pointer-events:none; }
    .verstuur-knop.actief { opacity:1; pointer-events:auto; }
    .verstuur-knop.actief:hover { background:var(--accent); transform:scale(1.03); }

    /* Opmerkingenstap */
    .opmerking-stap { display:none; max-width:500px; margin:0 auto; padding:0 1.5rem 2rem; }
    .opmerking-stap.zichtbaar { display:block; }
    .opmerking-titel { font-family:'Fraunces',serif; font-style:italic; font-weight:300; font-size:1.1rem; color:#7A6A58; margin-bottom:1rem; text-align:center; }
    .opmerking-textarea { width:100%; min-height:80px; padding:0.8rem 1rem; border:2px solid var(--zand); border-radius:12px; background:white; font-family:'DM Sans',sans-serif; font-size:0.9rem; color:var(--donker); resize:vertical; outline:none; transition:border-color 0.2s; }
    .opmerking-textarea:focus { border-color:var(--donker); }
    .opmerking-textarea::placeholder { color:#C0B0A0; }
    .opmerking-keuze { display:flex; gap:0.75rem; margin-top:0.75rem; justify-content:center; }
    .keuze-knop { flex:1; max-width:200px; padding:0.7rem 0.5rem; border:2px solid var(--zand); border-radius:12px; background:white; font-family:'DM Sans',sans-serif; font-size:0.75rem; font-weight:600; color:#7A6A58; cursor:pointer; text-align:center; transition:all 0.2s; }
    .keuze-knop:hover { border-color:var(--donker); color:var(--donker); }
    .keuze-knop.actief { border-color:var(--donker); background:var(--creme-2); color:var(--donker); }
    .keuze-knop .keuze-icoon { font-size:1.2rem; display:block; margin-bottom:3px; }
    .keuze-knop .keuze-naam { display:block; }
    .keuze-knop .keuze-sub { display:block; font-weight:400; font-size:0.65rem; color:#A09080; margin-top:2px; }
    .opmerking-skip { text-align:center; margin-top:0.75rem; font-size:0.8rem; color:#B0A090; cursor:pointer; text-decoration:underline; }
    .opmerking-skip:hover { color:#7A6A58; }

    /* Bevestiging */
    .bevestiging { display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:70vh; padding:2rem; gap:1.5rem; }
    .bevestiging.zichtbaar { display:flex; }
    .bevestiging-bloemen { display:flex; gap:1.5rem; align-items:flex-end; }
    .bevestiging h2 { font-family:'Fraunces',serif; font-weight:700; font-size:2rem; }
    .bevestiging p { font-size:1rem; color:#7A6A58; max-width:260px; }
  </style>
</head>
<body>

<div id="hoofdscherm">
  <header>
    <h1>OOGST</h1>
    <p class="ondertitel">Kies drie bloemen die beschrijven hoe jij je de afgelopen periode hebt gevoeld.</p>
    <div class="teller-balk">
      <span class="bolletje" id="bol-1"></span>
      <span class="bolletje" id="bol-2"></span>
      <span class="bolletje" id="bol-3"></span>
      <span class="teller-tekst" id="teller-tekst">0 van 3 gekozen</span>
    </div>
  </header>

  <div class="bloemen-grid" id="bloemen-grid"></div>

  <!-- Opmerkingenveld -->
  <div class="opmerking-stap" id="opmerking-stap">
    <p class="opmerking-titel">Wil je iets toevoegen? (niet verplicht)</p>
    <textarea class="opmerking-textarea" id="opmerking-tekst" placeholder="Schrijf hier een opmerking als je dat wil…" maxlength="300"></textarea>
    <div class="opmerking-keuze" id="opmerking-keuze" style="display:none;">
      <button class="keuze-knop" id="keuze-klas" onclick="kiesOpmerkingType('klas')">
        <span class="keuze-icoon">🌸</span>
        <span class="keuze-naam">Delen met de klas</span>
        <span class="keuze-sub">Zichtbaar in de tuin</span>
      </button>
    </div>
    <div class="opmerking-skip" onclick="verstuurBoeket(null)">Geen opmerking, verstuur boeket →</div>
  </div>

  <div class="verstuur-balk" id="verstuur-balk">
    <button class="verstuur-knop" id="verstuur-knop" onclick="toonOpmerkingStap()">Verstuur boeket</button>
  </div>
</div>

<div class="bevestiging" id="bevestiging">
  <div class="bevestiging-bloemen" id="bevestiging-bloemen"></div>
  <h2>Jouw boeket is verstuurd!</h2>
  <p>Je keuzes zijn aan de tuin toegevoegd. Kijk straks samen op het digibord!</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, push, ref } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAWDc4-qCewKSf3uKtrwyuav4z5wx8mIKw",
    authDomain: "oogst-emotions.firebaseapp.com",
    databaseURL: "https://oogst-emotions-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "oogst-emotions",
    storageBucket: "oogst-emotions.firebasestorage.app",
    messagingSenderId: "226895207258",
    appId: "1:226895207258:web:52bec11876f7f5ec0bf163"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // =============================================
  //  BLOEMEN — ruime gecentreerde crops
  //  viewBox: "x y breedte hoogte"
  //  Elke bloem staat volledig in beeld, gecentreerd.
  // =============================================
  const BLOEMEN = [
    { id:"blijdschap",    naam:"Blijdschap",    vb:"8 48 140 185"   },
    { id:"stress",        naam:"Stress",        vb:"323 271 130 130"},
    { id:"enthousiasme",  naam:"Enthousiasme",  vb:"160 40 140 185" },
    { id:"onzekerheid",   naam:"Onzekerheid",   vb:"469 210 140 185"},
    { id:"trots",         naam:"Trots",         vb:"355 74 130 130" },
    { id:"overweldiging", naam:"Overweldiging", vb:"8 406 140 185"  },
    { id:"rust",          naam:"Rust",          vb:"488 26 140 185" },
    { id:"verdriet",      naam:"Verdriet",      vb:"165 448 130 130"},
    { id:"opluchting",    naam:"Opluchting",    vb:"15 226 140 185" },
    { id:"eenzaamheid",   naam:"Eenzaamheid",   vb:"310 434 130 130"},
    { id:"tevredenheid",  naam:"Tevredenheid",  vb:"151 222 140 185"},
    { id:"boosheid",      naam:"Boosheid",      vb:"470 480 130 130"},
  ];

  // Gekozen bloemen: id → intensiteit (0–100, standaard 50)
  let gekozen = new Map();
  const MAX = 3;

  function maakSVG(vb, w, h) {
    return `<svg viewBox="${vb}" xmlns="http://www.w3.org/2000/svg"
      xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}">
      <image href="bloemen.svg" x="0" y="0" width="612" height="760"/>
    </svg>`;
  }

  function renderBloemen() {
    const grid = document.getElementById("bloemen-grid");
    grid.innerHTML = "";
    BLOEMEN.forEach(b => {
      const kaart = document.createElement("div");
      kaart.classList.add("bloem-kaart");
      kaart.id = "kaart-" + b.id;
      kaart.innerHTML = `
        <div class="vinkje">✓</div>
        <div class="bloem-icoon">${maakSVG(b.vb, 90, 90)}</div>
        <div class="bloem-naam">${b.naam}</div>
        <div class="intensiteit-wrap">
          <div class="intensiteit-rij">
            <span class="int-label-klein">Klein</span>
            <input
              type="range"
              class="intensiteit-slider"
              id="slider-${b.id}"
              min="0" max="100" value="50"
              oninput="updateIntensiteit('${b.id}', this.value)"
            />
            <span class="int-label-groot">Groot</span>
          </div>
        </div>
      `;
      kaart.addEventListener("click", (e) => {
        if (e.target.classList.contains("intensiteit-slider")) return;
        toggleBloem(b.id);
      });
      grid.appendChild(kaart);
    });
  }

  function toggleBloem(id) {
    if (gekozen.has(id)) { gekozen.delete(id); }
    else { if (gekozen.size >= MAX) return; gekozen.set(id, 50); }
    updateUI();
  }

  window.updateIntensiteit = function(id, waarde) {
    if (gekozen.has(id)) gekozen.set(id, parseInt(waarde));
  };

  function updateUI() {
    const n = gekozen.size;
    for (let i=1;i<=3;i++) document.getElementById("bol-"+i).classList.toggle("vol", i<=n);
    document.getElementById("teller-tekst").textContent = n + " van 3 gekozen";
    BLOEMEN.forEach(b => {
      const k = document.getElementById("kaart-"+b.id);
      k.classList.toggle("gekozen", gekozen.has(b.id));
      k.classList.toggle("uitgedoofd", n>=MAX && !gekozen.has(b.id));
    });
    document.getElementById("verstuur-knop").classList.toggle("actief", n===MAX);
    document.getElementById("opmerking-stap").classList.toggle("zichtbaar", n===MAX);
  }

  document.getElementById("opmerking-tekst").addEventListener("input", function() {
    const heeftTekst = this.value.trim().length > 0;
    document.getElementById("opmerking-keuze").style.display = heeftTekst ? "flex" : "none";
  });

  window.toonOpmerkingStap = function() {
    document.getElementById("verstuur-balk").style.display = "none";
    document.getElementById("opmerking-stap").classList.add("zichtbaar");
    document.getElementById("opmerking-stap").scrollIntoView({behavior:"smooth"});
  };

  window.kiesOpmerkingType = function(type) {
    document.getElementById("keuze-klas").classList.add("actief");
    verstuurBoeket(type);
  };

  window.verstuurBoeket = async function(opmerkingType) {
    if (gekozen.size < MAX) return;
    const tekst = document.getElementById("opmerking-tekst").value.trim();
    if (tekst && !opmerkingType) {
      document.getElementById("opmerking-keuze").style.display = "flex";
      return;
    }
    try {
      await push(ref(db, "boeketten"), {
        tijdstip: Date.now(),
        bloemen: Array.from(gekozen.keys()),
        intensiteiten: Object.fromEntries(gekozen), // 0–100 per bloem
        opmerking: tekst || null,
        opmerkingType: tekst ? opmerkingType : null
      });
      toonBevestiging();
    } catch(e) {
      console.error("Fout:", e);
      alert("Er ging iets mis. Probeer opnieuw.");
    }
  };

  function toonBevestiging() {
    document.getElementById("hoofdscherm").style.display = "none";
    document.getElementById("bevestiging").classList.add("zichtbaar");
    const container = document.getElementById("bevestiging-bloemen");
    gekozen.forEach((intensiteit, id) => {
      const b = BLOEMEN.find(x=>x.id===id);
      // Grootte in bevestiging op basis van intensiteit
      const maat = Math.round(50 + (intensiteit/100) * 40);
      const wrap = document.createElement("div");
      wrap.innerHTML = maakSVG(b.vb, maat, maat);
      container.appendChild(wrap);
    });
  }

  renderBloemen();
  updateUI();
</script>
</body>
</html>
